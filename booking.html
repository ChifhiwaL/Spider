<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO Meta Tags -->
    <title>Beru Art Tattoo Studio | Booking - Tattoo Consultation</title>
    <meta name="description" content="Book a tattoo consultation at Beru Art Tattoo Studio in Johannesburg. Fill out our booking form to discuss your custom tattoo design.">
    <meta name="keywords" content="book tattoo consultation, tattoo appointment, custom tattoo booking, Beru Art booking">
    <meta name="robots" content="index, follow">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Booking page - consultation request form -->
    <header>
        <div class="logo">
            <img src="images/Beru Art logo.png" alt="Beru Art Tattoo Studio Logo" width="120">
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="booking.html">Booking</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2>Book a Consultation</h2>
        <p>Fill out the form below to book your tattoo consultation</p>

        <!-- Booking form - collects client information and tattoo preferences -->
        <!-- Form validation will be handled by JavaScript in Part 3 -->
        <form id="bookingForm" action="#" method="post">
            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name" required minlength="2" placeholder="Enter your full name">

            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" required placeholder="Enter your email address">

            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" name="phone" required placeholder="Enter your phone number">

            <label for="tattoo-style">Preferred Tattoo Style:</label>
            <select id="tattoo-style" name="tattoo-style">
                <option value="">Select a style...</option>
                <option value="realism">Realism</option>
                <option value="blackwork">Blackwork</option>
                <option value="traditional">Traditional</option>
                <option value="geometric">Geometric</option>
                <option value="watercolor">Watercolor</option>
            </select>

            <label for="description">Tattoo Description:</label>
            <textarea id="description" name="description" rows="4" placeholder="Describe your tattoo idea..."></textarea>

            <label for="date">Preferred Date:</label>
            <input type="date" id="date" name="date">

            <div id="form-error" class="error-message"></div>
            <div id="form-success" class="success-message"></div>

            <button type="submit">Submit Booking Request</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 Beru Art Tattoo Studio. All rights reserved.</p>
        <p>Follow us: Instagram | Facebook</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>

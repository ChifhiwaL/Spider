<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO Meta Tags -->
    <title>Beru Art Tattoo Studio | Gallery - Tattoo Portfolio</title>
    <meta name="description" content="View the Beru Art Tattoo Studio portfolio. Browse custom tattoo designs including realism, blackwork, geometric, and traditional styles.">
    <meta name="keywords" content="tattoo gallery, tattoo portfolio, custom tattoo designs, realism tattoo, blackwork tattoo, Beru Art">
    <meta name="robots" content="index, follow">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Gallery page - portfolio of tattoo work -->
    <header>
        <div class="logo">
            <img src="images/Beru Art logo.png" alt="Beru Art Tattoo Studio Logo" width="120">
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="booking.html">Booking</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2>Our Tattoo Portfolio</h2>
        <p>Browse some of our recent work</p>

        <!-- Gallery grid displaying recent tattoo work -->
        <!-- Lightbox will be activated by JavaScript in Part 3 -->
        <div class="gallery-grid">
            <img src="images/tattoo 2.jpg" alt="Custom sleeve tattoo design" width="300" class="gallery-image" data-lightbox="gallery">
            <img src="images/tattoo 3.jpg" alt="Black and grey realism tattoo" width="300" class="gallery-image" data-lightbox="gallery">
            <img src="images/tattoo 4.jpg" alt="Colour floral tattoo" width="300" class="gallery-image" data-lightbox="gallery">
            <img src="images/tattoo 5.jpg" alt="Geometric tattoo design" width="300" class="gallery-image" data-lightbox="gallery">
            <img src="images/tattoo 6.jpg" alt="Traditional tattoo art" width="300" class="gallery-image" data-lightbox="gallery">
            <img src="images/hero.jpg" alt="Tattoo in progress at Beru Art Studio" width="300" class="gallery-image" data-lightbox="gallery">
        </div>
        
        <!-- Lightbox overlay container (hidden by default) -->
        <div id="lightbox" class="lightbox">
            <span class="close-lightbox">&times;</span>
            <img class="lightbox-content" id="lightbox-img">
            <div id="lightbox-caption"></div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Beru Art Tattoo Studio. All rights reserved.</p>
        <p>Follow us: Instagram | Facebook</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
